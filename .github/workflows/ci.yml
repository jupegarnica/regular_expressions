name: ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags-ignore:
      - "**"
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
      - name: Run CI
        run: deno task ci
      - name: Build docs
        run: deno task docs
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: build readme"
